services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - voice-code-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_SOCKET_SERVER_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - voice-code-network

networks:
  voice-code-network:
    driver: bridge
